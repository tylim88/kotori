name: all-pull-request
on: [push]
jobs:
  build_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
      - run: npm i
      - run: npm test
      - uses: codecov/codecov-action@v4
        with:
          files: ./coverage
      - run: npm run build
      - run: npm run lint
      